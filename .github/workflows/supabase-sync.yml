name: Sync Airtable → Supabase

# Runs every 5 min against the dashboard's /api/supabase/sync endpoint.
# Vercel Hobby tier caps cron jobs at one-per-day; GitHub Actions has no
# such limit and is free. The endpoint itself requires an x-cron-secret
# header that matches the CRON_SECRET env var on Vercel.
#
# How to set up: after the first push of this file, go to
#   GitHub repo → Settings → Secrets and variables → Actions
# and add a repository secret named CRON_SECRET with the same value that
# lives in the Vercel production env for the project.

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 minutes
  workflow_dispatch:          # lets you fire it manually from the Actions tab

concurrency:
  group: supabase-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit the sync endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          # Hit the sync endpoint, save headers + body separately so we can
          # check both the HTTP status and the JSON "success" flag.
          http_code=$(curl -sS -X POST \
            -H "x-cron-secret: $CRON_SECRET" \
            -o /tmp/resp.json \
            -w "%{http_code}" \
            -m 240 \
            "https://v0-vendingpreneurs-dashboard.vercel.app/api/supabase/sync")
          echo "HTTP status: $http_code"
          echo "Response body:"
          cat /tmp/resp.json
          echo
          # Fail if the HTTP code isn't 2xx
          if [[ ! "$http_code" =~ ^2 ]]; then
            echo "::error::Sync endpoint returned HTTP $http_code"
            exit 1
          fi
          # Fail if the JSON body doesn't include success:true
          if ! grep -q '"success":true' /tmp/resp.json; then
            echo "::error::Sync endpoint returned HTTP 200 but success was not true"
            exit 1
          fi
          # Print a one-line summary using jq (pre-installed on GH runners)
          jq -r '"OK: fetched=\(.fetched) leadsUpserted=\(.leadsUpserted) presencesUpserted=\(.presencesUpserted) durationMs=\(.durationMs)"' /tmp/resp.json
